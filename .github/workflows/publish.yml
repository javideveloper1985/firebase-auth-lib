name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  VERSION_MAJOR: 1
  VERSION_MINOR: 0
  VERSION_PATCH: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check if version already exists
        id: version_check
        run: |
          VERSION="${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_PATCH }}"
          if npm view @javideveloper1985/expo-firebase-auth@$VERSION version 2>/dev/null; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "Version $VERSION already exists on npm. Run the workflow manually to force publish."
              exit 1
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Set version
        run: npm version ${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_PATCH }} --no-git-tag-version --allow-same-version

      - name: Publish package
        if: steps.version_check.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish
        if: steps.version_check.outputs.exists == 'true'
        run: echo "Forced manual publish skipped — version ${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_PATCH }} already exists. Update the version variables to publish a new version."
